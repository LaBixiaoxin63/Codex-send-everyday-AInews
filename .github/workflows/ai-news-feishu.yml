name: AI News to Feishu

on:
  schedule:
    # 12:07 Asia/Shanghai, after the daily curated digest; GitHub Actions uses UTC.
    # Avoid the top of the hour because scheduled runs can be delayed.
    - cron: "7 4 * * *"
    # 21:30 Asia/Shanghai every Sunday, weekly AI highlights.
    - cron: "30 13 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Digest mode"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Send AI news digest to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          AI_NEWS_MODE: ${{ github.event.schedule == '30 13 * * 0' && 'weekly' || github.event.inputs.mode || 'daily' }}
        run: node scripts/send-ai-news-feishu.mjs
