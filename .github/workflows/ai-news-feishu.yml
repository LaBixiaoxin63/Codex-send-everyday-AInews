name: AI News to Feishu

on:
  schedule:
    # 06:53 Asia/Shanghai, GitHub Actions uses UTC.
    # Avoid the top of the hour because scheduled runs can be delayed or dropped.
    - cron: "53 22 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Send AI news digest to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: node scripts/send-ai-news-feishu.mjs
